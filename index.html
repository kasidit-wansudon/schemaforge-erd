const FIELD_TYPES=["int","bigint","varchar","text","decimal","float","date","timestamp","enum","boolean","json","uuid"];
const TC={int:"#00d4ff",bigint:"#38bdf8",varchar:"#a78bfa",text:"#34d399",decimal:"#f59e0b",float:"#fbbf24",date:"#f472b6",timestamp:"#94a3b8",enum:"#fb923c",boolean:"#22d3ee",json:"#c084fc",uuid:"#67e8f9"};
const DS={varchar:"255",decimal:"10,2"};

let _u=0;const uid=()=>`u${++_u}_${Date.now()}`;

// ============================================
// SQL PARSER
// ============================================
// ── Smart comma splitter: respects parentheses depth ──
// Splits "col1 INT, col2 ENUM('a','b','c'), col3 TEXT" correctly
function splitColumns(body){
  const results=[];let depth=0,cur="",inStr=false,strCh="";
  for(let i=0;i<body.length;i++){
    const ch=body[i];
    if(inStr){cur+=ch;if(ch===strCh&&body[i-1]!=="\\")inStr=false;continue;}
    if(ch==="'"||ch==='"'){inStr=true;strCh=ch;cur+=ch;continue;}
    if(ch==="("){depth++;cur+=ch;continue;}
    if(ch===")"){depth--;cur+=ch;continue;}
    if(ch===","&&depth===0){results.push(cur.trim());cur="";continue;}
    cur+=ch;
  }
  if(cur.trim())results.push(cur.trim());
  return results.filter(Boolean);
}

// ── Extract table name from various formats ──
// Handles: `table`, `schema`.`table`, schema.table, IF NOT EXISTS
function extractTableName(header){
  // Remove IF NOT EXISTS
  let h=header.replace(/IF\s+NOT\s+EXISTS\s+/i,"").trim();
  // Match last backtick-quoted or bare name
  // `schema`.`table` → table
  // `table` → table
  // schema.table → table
  // table → table
  const m=h.match(/(?:`([^`]+)`|(\w+))(?:\s*\.\s*(?:`([^`]+)`|(\w+)))?$/);
  if(!m)return null;
  // If there's a dot notation, take the second part (table name)
  return m[3]||m[4]||m[1]||m[2]||null;
}

// ── Production SQL Parser (State-Machine) ──
// Core fix: Uses parentheses depth counting instead of regex to find table body
// This correctly handles ENUM('a','b','c'), SET(...), DEFAULT (...), nested parens
function parseSQL(sql){
  const tables=[];

  // Step 1: Strip comments and non-CREATE statements
  let clean=sql
    .replace(/--[^\n]*/g,"")
    .replace(/\/\*[\s\S]*?\*\//g,"")
    .replace(/^\s*SET\s+.*?;\s*$/gm,"")
    .replace(/^\s*DROP\s+.*?;\s*$/gm,"")
    .replace(/^\s*INSERT\s+.*?;\s*$/gm,"")
    .replace(/^\s*LOCK\s+.*?;\s*$/gm,"")
    .replace(/^\s*UNLOCK\s+.*?;\s*$/gm,"");

  // Step 2: Find each CREATE TABLE using state-machine for balanced parens
  const ctRe=/CREATE\s+TABLE\s+((?:IF\s+NOT\s+EXISTS\s+)?[^\(]+?)\s*\(/gi;
  let ctMatch;

  while((ctMatch=ctRe.exec(clean))!==null){
    const tableName=extractTableName(ctMatch[1]);
    if(!tableName)continue;

    // Find balanced closing paren from the opening "("
    const startIdx=ctMatch.index+ctMatch[0].length; // right after "("
    let depth=1, pos=startIdx, inStr=false, strCh="";

    while(pos<clean.length && depth>0){
      const ch=clean[pos];
      if(inStr){
        if(ch===strCh && clean[pos-1]!=="\\") inStr=false;
      } else {
        if(ch==="'" || ch==='"'){ inStr=true; strCh=ch; }
        else if(ch==="(") depth++;
        else if(ch===")") depth--;
      }
      if(depth>0) pos++;
    }

    if(depth!==0) continue; // unbalanced parens, skip

    const body=clean.substring(startIdx, pos);
    const fields=[];

    // Step 3: Split columns using depth-aware splitter
    const lines=splitColumns(body);

    for(const line of lines){
      // Skip constraints, keys, indexes — match start of trimmed line
      if(line.match(/^\s*(PRIMARY\s+KEY|FOREIGN\s+KEY|UNIQUE(\s+KEY|\s+INDEX)?|INDEX|KEY\s+`|KEY\s+"|CONSTRAINT|CHECK|EXCLUDE)\b/i))continue;

      // Match: `field` TYPE(...) or "field" TYPE(...) or field TYPE(...)
      const fm=line.match(/^\s*(?:`([^`]+)`|"([^"]+)"|(\w+))\s+(\w+)(?:\s*\(([^)]*(?:\([^)]*\))*[^)]*)\))?/i);
      if(!fm)continue;

      const fieldName=fm[1]||fm[2]||fm[3];
      if(!fieldName)continue;

      let rawType=fm[4].toLowerCase();
      let size=fm[5]||"";

      // ENUM/SET: extract value count from original line
      if(rawType==="enum"||rawType==="set"){
        const enumMatch=line.match(/(?:enum|set)\s*\(((?:[^)]*(?:'(?:[^'\\]|\\.)*')?)*[^)]*)\)/i);
        if(enumMatch){
          const vals=(enumMatch[1].match(/'(?:[^'\\]|\\.)*'/g))||[];
          size=vals.length+" vals";
        }
      }

      // Normalize type
      let type=rawType;
      if(rawType==="tinyint"&&(size==="1"||line.match(/tinyint\s*\(\s*1\s*\)/i)))type="boolean";
      else if(rawType.includes("bigint"))type="bigint";
      else if(rawType.includes("serial"))type=rawType==="bigserial"?"bigint":"int";
      else if(rawType.includes("int")||rawType==="integer"||rawType==="mediumint"||rawType==="smallint")type="int";
      else if(rawType.includes("varchar")||rawType==="character"||rawType==="char"||rawType==="nvarchar")type="varchar";
      else if(rawType.includes("text")||rawType==="longtext"||rawType==="mediumtext"||rawType==="tinytext")type="text";
      else if(rawType.includes("decimal")||rawType.includes("numeric")||rawType==="money")type="decimal";
      else if(rawType.includes("float")||rawType.includes("double")||rawType==="real")type="float";
      else if(rawType==="date")type="date";
      else if(rawType.includes("timestamp")||rawType.includes("datetime")||rawType==="timestamptz")type="timestamp";
      else if(rawType==="time"||rawType==="timetz")type="timestamp";
      else if(rawType==="enum"||rawType==="set")type="enum";
      else if(rawType.includes("bool"))type="boolean";
      else if(rawType.includes("json")||rawType==="jsonb")type="json";
      else if(rawType==="uuid")type="uuid";
      else if(rawType==="blob"||rawType==="longblob"||rawType==="mediumblob"||rawType==="binary"||rawType==="varbinary"||rawType==="bytea"||rawType==="tinyblob")type="text";

      // Clean size
      if(type!=="enum") size=(size||"").replace(/'/g,"").trim();
      if(type==="boolean") size="";
      if(!size&&DS[type]) size=DS[type];

      const lineUpper=line.toUpperCase();
      fields.push({
        id:uid(), name:fieldName, type, size,
        isPrimary: lineUpper.includes("PRIMARY KEY")||fieldName==="id",
        isForeign: fieldName.endsWith("_id")&&fieldName!=="id",
        nullable: !lineUpper.includes("NOT NULL")&&!lineUpper.includes("PRIMARY KEY"),
      });
    }

    tables.push({id:uid(), name:tableName, fields});
  }

  return tables;
}

function detectRelations(tables){
  const rels=[],names=tables.map(t=>t.name);
  for(const t of tables)for(const f of t.fields)if(f.isForeign){
    const ref=f.name.replace(/_id$/,"");
    const c=names.filter(n=>n===ref||n===ref+"s"||n===ref+"es");
    if(c.length>0)rels.push({id:uid(),from:t.name,fromField:f.name,to:c[0],toField:"id"});
  }
  return rels;
}

// ============================================
// REUSABLE UI
// ============================================
const Btn=({children,variant="ghost",onClick,style:sx,...r})=>{
  const base={border:"none",cursor:"pointer",fontFamily:"'DM Sans'",transition:"all .15s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:8,fontWeight:500,whiteSpace:"nowrap",padding:"6px 14px",fontSize:12};
  const v={
    ghost:{background:"rgba(255,255,255,.05)",color:"#94a3b8",border:"1px solid rgba(255,255,255,.1)"},
    cyan:{background:"rgba(0,212,255,.15)",color:"#00d4ff",border:"1px solid rgba(0,212,255,.3)"},
    amber:{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#06080f",fontWeight:600,boxShadow:"0 2px 12px rgba(245,158,11,.3)"},
    cyanSolid:{background:"linear-gradient(135deg,#00d4ff,#0ea5e9)",color:"#06080f",fontWeight:600,boxShadow:"0 4px 20px rgba(0,212,255,.3)"},
    danger:{background:"rgba(239,68,68,.12)",color:"#ef4444",border:"1px solid rgba(239,68,68,.25)"},
    green:{background:"rgba(52,211,153,.12)",color:"#34d399",border:"1px solid rgba(52,211,153,.25)"},
    purple:{background:"rgba(167,139,250,.15)",color:"#a78bfa",border:"1px solid rgba(167,139,250,.3)"},
    active:{background:"rgba(0,212,255,.25)",color:"#00d4ff",border:"2px solid #00d4ff",boxShadow:"0 0 12px rgba(0,212,255,.3)"},
  };
  return <button onClick={onClick} style={{...base,...v[variant],...sx}} {...r}>{children}</button>;
};

const Overlay=({children,onClose})=>(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(6px)",animation:"fadeIn .2s"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{animation:"scaleIn .2s ease"}}>{children}</div>
  </div>
);

const ModalShell=({title,onClose,width=560,children})=>(
  <Overlay onClose={onClose}>
    <div style={{width,maxWidth:"94vw",maxHeight:"85vh",display:"flex",flexDirection:"column",background:"#0c1020",border:"1px solid rgba(255,255,255,.1)",borderRadius:16,overflow:"hidden"}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontFamily:"'JetBrains Mono'",fontWeight:600,fontSize:15,color:"#e2e8f0"}}>{title}</span>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:18}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>{children}</div>
    </div>
  </Overlay>
);

// ── Field Row ──
const FieldRow=({field:f,index:i,total,onChange,onRemove,onMove,canRemove})=>(
  <div style={{display:"grid",gridTemplateColumns:"28px 1fr 86px 56px 38px 38px 30px",gap:4,alignItems:"center",padding:"4px 8px",background:"rgba(255,255,255,.02)",borderRadius:8,border:`1px solid ${f.isPrimary?"rgba(245,158,11,.12)":f.isForeign?"rgba(167,139,250,.12)":"rgba(255,255,255,.04)"}`}}>
    <div style={{display:"flex",flexDirection:"column"}}>
      <button onClick={()=>onMove(i,-1)} disabled={i===0} style={{background:"none",border:"none",color:i===0?"#1e293b":"#64748b",cursor:"pointer",fontSize:9,padding:0,lineHeight:1}}>▲</button>
      <button onClick={()=>onMove(i,1)} disabled={i===total-1} style={{background:"none",border:"none",color:i===total-1?"#1e293b":"#64748b",cursor:"pointer",fontSize:9,padding:0,lineHeight:1}}>▼</button>
    </div>
    <input value={f.name} onChange={e=>onChange(i,"name",e.target.value)} placeholder="field_name" style={{background:"transparent",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,padding:"5px 8px",color:"#e2e8f0",fontFamily:"'JetBrains Mono'",fontSize:11,outline:"none"}}/>
    <select value={f.type} onChange={e=>{onChange(i,"type",e.target.value);onChange(i,"size",DS[e.target.value]||"");}} style={{background:"#0a0e1a",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,padding:"5px 3px",color:TC[f.type]||"#94a3b8",fontFamily:"'JetBrains Mono'",fontSize:10,cursor:"pointer",outline:"none",minWidth:0}}>
      {FIELD_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
    <input value={f.size||""} onChange={e=>onChange(i,"size",e.target.value)} placeholder="size" style={{background:"transparent",border:"1px solid rgba(255,255,255,.06)",borderRadius:6,padding:"4px 5px",color:"#94a3b8",fontFamily:"'JetBrains Mono'",fontSize:10,outline:"none",width:"100%"}}/>
    <div style={{textAlign:"center"}}><input type="checkbox" checked={f.isPrimary} onChange={e=>onChange(i,"isPrimary",e.target.checked)} style={{accentColor:"#f59e0b"}} title="PK"/></div>
    <div style={{textAlign:"center"}}><input type="checkbox" checked={f.nullable} onChange={e=>onChange(i,"nullable",e.target.checked)} style={{accentColor:"#64748b"}} title="Null"/></div>
    {canRemove?<button onClick={()=>onRemove(i)} style={{background:"rgba(239,68,68,.08)",border:"none",color:"#ef4444",borderRadius:6,cursor:"pointer",fontSize:12,width:24,height:24}}>×</button>:<div style={{width:24}}/>}
  </div>
);

// ============================================
// ADD TABLE MODAL
// ============================================
function AddTableModal({onClose,onAdd,existingNames}){
  const [name,setName]=useState("");
  const [fields,setFields]=useState([
    {id:uid(),name:"id",type:"int",size:"",isPrimary:true,isForeign:false,nullable:false},
    {id:uid(),name:"created_at",type:"timestamp",size:"",isPrimary:false,isForeign:false,nullable:true},
    {id:uid(),name:"updated_at",type:"timestamp",size:"",isPrimary:false,isForeign:false,nullable:true},
  ]);
  const [error,setError]=useState("");
  const addField=()=>{const nf={id:uid(),name:"",type:"varchar",size:"255",isPrimary:false,isForeign:false,nullable:true};const ts=fields.slice(-2);const h=ts.some(f=>f.name==="created_at")&&ts.some(f=>f.name==="updated_at");setFields(h?[...fields.slice(0,-2),nf,...fields.slice(-2)]:[...fields,nf]);};
  const updateField=(idx,key,val)=>{setFields(fields.map((f,i)=>{if(i!==idx)return f;const u={...f,[key]:val};if(key==="name")u.isForeign=val.endsWith("_id")&&val!=="id";return u;}));};
  const moveField=(idx,dir)=>{const a=[...fields];const t=idx+dir;if(t<0||t>=a.length)return;[a[idx],a[t]]=[a[t],a[idx]];setFields(a);};
  const submit=()=>{const tr=name.trim().toLowerCase().replace(/\s+/g,"_");if(!tr){setError("Table name is required");return;}if(existingNames.includes(tr)){setError("Table name already exists");return;}onAdd({id:uid(),name:tr,fields:fields.filter(f=>f.name.trim())});onClose();};
  return(
    <ModalShell title="✦ Add New Table" onClose={onClose} width={640}>
      <div style={{padding:20}}>
        <div style={{marginBottom:16}}><label style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4}}>Table Name</label>
          <input value={name} onChange={e=>{setName(e.target.value);setError("");}} placeholder="e.g. products, categories" style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontFamily:"'JetBrains Mono'",fontSize:13}}/>
          {error&&<div style={{color:"#ef4444",fontSize:12,marginTop:4}}>{error}</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Fields</span><Btn variant="cyan" onClick={addField}>+ Field</Btn></div>
        <div style={{display:"grid",gridTemplateColumns:"28px 1fr 86px 56px 38px 38px 30px",gap:4,padding:"0 8px 4px",fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:1}}><span/><span>Name</span><span>Type</span><span>Size</span><span>PK</span><span>Null</span><span/></div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {fields.map((f,i)=><FieldRow key={f.id} field={f} index={i} total={fields.length} onChange={updateField} onRemove={idx=>setFields(fields.filter((_,j)=>j!==idx))} onMove={moveField} canRemove={!(f.name==="id"||f.name==="created_at"||f.name==="updated_at")}/>)}
        </div>
        <div style={{marginTop:20,display:"flex",justifyContent:"flex-end",gap:8}}><Btn variant="ghost" onClick={onClose}>Cancel</Btn><Btn variant="cyanSolid" onClick={submit} style={{padding:"9px 24px",fontSize:13}}>Create Table</Btn></div>
      </div>
    </ModalShell>
  );
}

// ============================================
// EDIT TABLE MODAL
// ============================================
function EditTableModal({table,onClose,onSave,onDelete}){
  const [name,setName]=useState(table.name);
  const [fields,setFields]=useState(table.fields.map(f=>({...f})));
  const addField=()=>{const nf={id:uid(),name:"",type:"varchar",size:"255",isPrimary:false,isForeign:false,nullable:true};const ts=fields.slice(-2);const h=ts.some(f=>f.name==="created_at")&&ts.some(f=>f.name==="updated_at");setFields(h?[...fields.slice(0,-2),nf,...fields.slice(-2)]:[...fields,nf]);};
  const updateField=(idx,key,val)=>{setFields(fields.map((f,i)=>{if(i!==idx)return f;const u={...f,[key]:val};if(key==="name")u.isForeign=val.endsWith("_id")&&val!=="id";return u;}));};
  const moveField=(idx,dir)=>{const a=[...fields];const t=idx+dir;if(t<0||t>=a.length)return;[a[idx],a[t]]=[a[t],a[idx]];setFields(a);};
  return(
    <ModalShell title={`✎ Edit — ${table.name}`} onClose={onClose} width={680}>
      <div style={{padding:20}}>
        <div style={{marginBottom:16}}><label style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:4}}>Table Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontFamily:"'JetBrains Mono'",fontSize:13}}/>
        </div>

  const fmtType=(f,d)=>{const s=f.size?`(${f.size})`:"";const map={mysql:{int:`INT${s}`,bigint:`BIGINT${s}`,varchar:`VARCHAR${s||"(255)"}`,text:"TEXT",decimal:`DECIMAL${s||"(10,2)"}`,float:`FLOAT${s}`,date:"DATE",timestamp:"TIMESTAMP DEFAULT CURRENT_TIMESTAMP",enum:`VARCHAR${s||"(50)"}`,boolean:"TINYINT(1)",json:"JSON",uuid:"CHAR(36)"},postgres:{int:"INTEGER",bigint:"BIGINT",varchar:`VARCHAR${s||"(255)"}`,text:"TEXT",decimal:`NUMERIC${s||"(10,2)"}`,float:"REAL",date:"DATE",timestamp:"TIMESTAMPTZ DEFAULT NOW()",enum:`VARCHAR${s||"(50)"}`,boolean:"BOOLEAN",json:"JSONB",uuid:"UUID DEFAULT gen_random_uuid()"}};return map[d]?.[f.type]||`VARCHAR${s||"(255)"}`};
  const toPascal=s=>s.split("_").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join("");
  const toCamel=s=>{const p=toPascal(s);return p.charAt(0).toLowerCase()+p.slice(1)};
  const pType={int:"Int",bigint:"BigInt",varchar:"String",text:"String",decimal:"Decimal",float:"Float",date:"DateTime",timestamp:"DateTime",enum:"String",boolean:"Boolean",json:"Json",uuid:"String"};
  const lM={int:"integer",bigint:"bigInteger",varchar:"string",text:"text",decimal:"decimal",float:"float",date:"date",timestamp:"timestamp",enum:"string",boolean:"boolean",json:"json",uuid:"uuid"};
  const generate=()=>{
    const hdr=`-- Generated by SchemaForge v${VERSION}\n-- ${new Date().toISOString()}\n-- Developer: ${DEVELOPER}\n-- Format: ${tab.toUpperCase()}\n\n`;
    if(tab==="mysql"){let sql=hdr;for(const t of tables){sql+=`CREATE TABLE \`${t.name}\` (\n`;const lines=t.fields.map(f=>{let l=`  \`${f.name}\` ${fmtType(f,"mysql")}`;if(f.isPrimary||f.name==="id")l+=" PRIMARY KEY AUTO_INCREMENT";else if(!f.nullable)l+=" NOT NULL";return l});const fks=relations.filter(r=>r.from===t.name).map(r=>`  FOREIGN KEY (\`${r.fromField}\`) REFERENCES \`${r.to}\`(\`${r.toField}\`)`);sql+=[...lines,...fks].join(",\n")+"\n);\n\n";}return sql;}
    if(tab==="postgres"){let sql=hdr;for(const t of tables){sql+=`CREATE TABLE "${t.name}" (\n`;const lines=t.fields.map(f=>{let pt=fmtType(f,"postgres");if((f.isPrimary||f.name==="id")&&(f.type==="int"||f.type==="bigint"))pt=f.type==="bigint"?"BIGSERIAL":"SERIAL";let l=`  "${f.name}" ${pt}`;if(f.isPrimary||f.name==="id")l+=" PRIMARY KEY";else if(!f.nullable)l+=" NOT NULL";return l});const fks=relations.filter(r=>r.from===t.name).map(r=>`  CONSTRAINT "fk_${t.name}_${r.fromField}" FOREIGN KEY ("${r.fromField}") REFERENCES "${r.to}"("${r.toField}")`);sql+=[...lines,...fks].join(",\n")+"\n);\n\n";t.fields.filter(f=>f.isForeign).forEach(fk=>{sql+=`CREATE INDEX "idx_${t.name}_${fk.name}" ON "${t.name}" ("${fk.name}");\n`});sql+="\n";}return sql;}
    if(tab==="laravel"){let c=`// Generated by SchemaForge v${VERSION} — Laravel\n// ${DEVELOPER}\n\n`;for(const t of tables){c+=`Schema::create('${t.name}', function (Blueprint $table) {\n`;for(const f of t.fields){if(f.name==="id"){c+=`    $table->id();\n`;continue;}if(f.name==="created_at"||f.name==="updated_at")continue;const m=lM[f.type]||"string";c+=`    $table->${m}('${f.name}'`;if(f.size&&(f.type==="varchar"||f.type==="decimal")){if(f.type==="decimal"){const p=f.size.split(",");c+=`, ${p[0]||10}, ${p[1]||2}`;}else c+=`, ${f.size}`;}c+=`)`;if(f.isForeign){const rel=relations.find(r=>r.from===t.name&&r.fromField===f.name);if(rel)c+=`->constrained('${rel.to}')`;}if(f.nullable)c+=`->nullable()`;c+=`;\n`;}if(t.fields.some(f=>f.name==="created_at"))c+=`    $table->timestamps();\n`;c+=`});\n\n`;}return c;}
    if(tab==="prisma"){let s=`// Generated by SchemaForge v${VERSION} — Prisma\n// ${DEVELOPER}\n\ngenerator client {\n  provider = "prisma-client-js"\n}\n\ndatasource db {\n  provider = "postgresql"\n  url      = env("DATABASE_URL")\n}\n\n`;for(const t of tables){const mdl=toPascal(t.name);s+=`model ${mdl} {\n`;for(const f of t.fields){if(f.name==="id"){s+=`  ${f.name.padEnd(14)}${(f.type==="uuid"?"String":"Int").padEnd(10)}@id ${f.type==="uuid"?"@default(uuid())":"@default(autoincrement())"}\n`;continue;}if(f.name==="created_at"){s+=`  createdAt      DateTime   @default(now()) @map("created_at")\n`;continue;}if(f.name==="updated_at"){s+=`  updatedAt      DateTime   @updatedAt @map("updated_at")\n`;continue;}const pt=pType[f.type]||"String";const nl=f.nullable?"?":"";if(f.isForeign){const rel=relations.find(r=>r.from===t.name&&r.fromField===f.name);if(rel){s+=`  ${f.name.padEnd(14)}${(pt+nl).padEnd(10)}\n  ${toCamel(rel.to).padEnd(14)}${toPascal(rel.to).padEnd(10)}@relation(fields: [${f.name}], references: [${rel.toField}])\n`;continue;}}s+=`  ${f.name.padEnd(14)}${pt+nl}\n`;}relations.filter(r=>r.to===t.name).forEach(rr=>{s+=`  ${(toCamel(rr.from)+"s").padEnd(14)}${toPascal(rr.from)}[]\n`});s+=`\n  @@map("${t.name}")\n}\n\n`;}return s;}
    return "";
  };
  const output=generate();const exts={mysql:"schema.sql",postgres:"schema_pg.sql",laravel:"migration.php",prisma:"schema.prisma"};const colors={mysql:"#a5f3fc",postgres:"#38bdf8",laravel:"#fb923c",prisma:"#a78bfa"};
  return(

      <pre style={{padding:20,margin:0,maxHeight:420,overflowY:"auto",fontFamily:"'JetBrains Mono'",fontSize:11.5,lineHeight:1.7,color:colors[tab],background:"#080c18"}}>{output}</pre>
      <div style={{padding:"12px 20px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"#475569",fontFamily:"'JetBrains Mono'"}}>{output.split("\n").length} lines · {exts[tab]}</span>

// ============================================
// EXPORT IMAGE (PNG/SVG/PDF)
// ============================================
function renderERDtoSVG(tables,relations){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  const TW=260,HDR=42,ROW=25,PAD=40;
  for(const t of tables){minX=Math.min(minX,t.x);minY=Math.min(minY,t.y);maxX=Math.max(maxX,t.x+TW);maxY=Math.max(maxY,t.y+HDR+t.fields.length*ROW);}
  minX-=PAD;minY-=PAD;maxX+=PAD;maxY+=PAD;const w=maxX-minX,h=maxY-minY;
  const fc=(tN,fN)=>{const t=tables.find(tb=>tb.name===tN);if(!t)return{x:0,y:0};const fi=t.fields.findIndex(f=>f.name===fN);return{x:t.x+TW/2,y:t.y+HDR+(fi>=0?fi:0)*ROW+ROW/2}};
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="${minX} ${minY} ${w} ${h}" style="background:#06080f"><defs><marker id="ea" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b" opacity=".8"/></marker></defs><style>text{font-family:'JetBrains Mono','Courier New',monospace}</style>`;
  for(const rel of relations){const from=fc(rel.from,rel.fromField),to=fc(rel.to,rel.toField);const cp=Math.abs(from.x-to.x)*.35+50;const sX=from.x+(to.x>from.x?TW/2+4:-TW/2-4),eX=to.x+(from.x>to.x?TW/2+4:-TW/2-4);svg+=`<path d="M ${sX} ${from.y} C ${sX+(to.x>from.x?cp:-cp)} ${from.y},${eX+(from.x>to.x?cp:-cp)} ${to.y},${eX} ${to.y}" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity=".6" marker-end="url(#ea)" stroke-dasharray="6 3"/>`;}
  for(const t of tables){const th=HDR+t.fields.length*ROW;svg+=`<rect x="${t.x}" y="${t.y}" width="${TW}" height="${th}" rx="10" fill="#0a101e" stroke="rgba(255,255,255,.12)"/><rect x="${t.x}" y="${t.y}" width="${TW}" height="${HDR}" rx="10" fill="rgba(0,212,255,.06)"/><rect x="${t.x}" y="${t.y+HDR-10}" width="${TW}" height="10" fill="rgba(0,212,255,.06)"/><line x1="${t.x}" y1="${t.y+HDR}" x2="${t.x+TW}" y2="${t.y+HDR}" stroke="rgba(255,255,255,.08)"/><text x="${t.x+14}" y="${t.y+27}" fill="#e2e8f0" font-size="13" font-weight="600">${t.name}</text>`;
    t.fields.forEach((f,fi)=>{const fy=t.y+HDR+fi*ROW;const col=f.isPrimary||f.name==="id"?"#f59e0b":f.isForeign?"#a78bfa":"#cbd5e1";const tag=f.isPrimary||f.name==="id"?"PK":f.isForeign?"FK":"";if(tag)svg+=`<text x="${t.x+14}" y="${fy+20}" fill="${col}" font-size="9" font-weight="700">${tag}</text>`;svg+=`<text x="${t.x+36}" y="${fy+20}" fill="${col}" font-size="11">${f.name}</text>`;const tl=f.size?`${f.type}(${f.size})`:f.type;svg+=`<text x="${t.x+TW-14}" y="${fy+20}" fill="${TC[f.type]||"#64748b"}" font-size="9" text-anchor="end">${tl}</text>`;});}
  svg+=`<text x="${minX+PAD}" y="${maxY-10}" fill="#334155" font-size="10">SchemaForge v${VERSION} · ${DEVELOPER}</text></svg>`;
  return{svg,w,h};
}

              <span style={{fontSize:24}}>{o.icon}</span>
              <div><div style={{fontFamily:"'JetBrains Mono'",fontSize:13,fontWeight:600,color:format===o.key?"#00d4ff":"#e2e8f0"}}>{o.label}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{o.desc}</div></div>

            <button onClick={doParse} style={{width:"100%",marginTop:14,padding:"13px 0",background:"linear-gradient(135deg,#00d4ff,#0ea5e9)",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"'JetBrains Mono'",fontWeight:600,fontSize:14,color:"#06080f",boxShadow:"0 4px 24px rgba(0,212,255,.3)"}}>⚡ Parse & Detect Relations</button>
          </div>
          <div>
            {!preview?<div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderRadius:16,padding:48,textAlign:"center",minHeight:380,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:56,marginBottom:14,opacity:.3}}>⟐</div><p style={{color:"#475569",fontSize:14}}>Parsed schema will appear here</p></div>
            :<div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.06)",borderRadius:16,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
                {[{l:"Tables",v:preview.tables.length,c:"#00d4ff"},{l:"Fields",v:preview.tables.reduce((a,t)=>a+t.fields.length,0),c:"#a78bfa"},{l:"Relations",v:preview.relations.length,c:"#f59e0b"}].map((s,i)=><div key={i} style={{padding:"14px 18px",borderRight:i<2?"1px solid rgba(255,255,255,.06)":"none"}}><div style={{fontFamily:"'JetBrains Mono'",fontSize:26,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:10,color:"#64748b",marginTop:2,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div></div>)}
              </div>
              {parseInfo&&<div style={{padding:"8px 18px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:"#64748b"}}>SQL: {parseInfo.lines.toLocaleString()} lines · {(parseInfo.chars/1024).toFixed(1)} KB</span>
                <span style={{color:preview.tables.length===parseInfo.sqlTables?"#34d399":"#f59e0b",fontFamily:"'JetBrains Mono'",fontWeight:600}}>
                  {preview.tables.length===parseInfo.sqlTables?"✓":"⚠"} Parsed {preview.tables.length}/{parseInfo.sqlTables} CREATE TABLE
                </span>
              </div>}
              <div style={{padding:14,maxHeight:200,overflowY:"auto"}}>{preview.tables.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",borderRadius:8,marginBottom:3,background:"rgba(255,255,255,.03)"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"'JetBrains Mono'",fontSize:9,fontWeight:600,background:"rgba(0,212,255,.15)",color:"#00d4ff",padding:"2px 6px",borderRadius:4}}>TBL</span><span style={{fontFamily:"'JetBrains Mono'",fontSize:12}}>{t.name}</span></div><span style={{fontSize:11,color:"#64748b"}}>{t.fields.length} fields</span></div>)}</div>
              <div style={{padding:14,borderTop:"1px solid rgba(255,255,255,.06)"}}><button onClick={()=>onParse(preview)} style={{width:"100%",padding:"13px 0",background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"'JetBrains Mono'",fontWeight:600,fontSize:14,color:"#06080f",boxShadow:"0 4px 24px rgba(245,158,11,.3)"}}>🚀 Open Interactive Canvas</button></div>
            </div>}
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:48,padding:"16px 0",borderTop:"1px solid rgba(255,255,255,.04)",color:"#334155",fontSize:11}}>
          SchemaForge v{VERSION} · {BUILD_DATE} · Developed by {DEVELOPER}
        </div>
      </div>
    </div>
  );
}

// ============================================
// PAGE 2: CANVAS
// ============================================
function CanvasPage({schema,onBack}){
  const canvasRef=useRef(null);const[tables,setTables]=useState([]);const[relations,setRelations]=useState([]);const[dragging,setDragging]=useState(null);const[offset,setOffset]=useState({x:0,y:0});const[zoom,setZoom]=useState(.85);const[pan,setPan]=useState({x:0,y:0});const[isPanning,setIsPanning]=useState(false);const[panStart,setPanStart]=useState({x:0,y:0});const[selected,setSelected]=useState(null);const[showExport,setShowExport]=useState(false);const[showExportImage,setShowExportImage]=useState(false);const[showAddTable,setShowAddTable]=useState(false);const[editingTable,setEditingTable]=useState(null);const[showRelations,setShowRelations]=useState(false);const[showMinimap,setShowMinimap]=useState(true);const[toast,setToast]=useState(null);
  const[linkMode,setLinkMode]=useState(false);const[linkFrom,setLinkFrom]=useState(null);const[linkMouse,setLinkMouse]=useState(null);const[hoveredField,setHoveredField]=useState(null);const[spacePressed,setSpacePressed]=useState(false);
  const flash=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500)};
  useEffect(()=>{if(!schema)return;const vw=window.innerWidth-24,vh=window.innerHeight-100;const cols=Math.ceil(Math.sqrt(schema.tables.length));const gridW=cols*320,gridH=Math.ceil(schema.tables.length/cols)*340;const startX=Math.max(80,(vw-gridW)/2),startY=Math.max(80,(vh-gridH)/2);setTables(schema.tables.map((t,i)=>({...t,x:startX+(i%cols)*320,y:startY+Math.floor(i/cols)*340,collapsed:false})));setRelations(schema.relations);setZoom(.85);setPan({x:0,y:0})},[schema]);
  const TW=260,HDR=36,ROW=27.5;
  const onTblDown=(e,idx)=>{if(e.button===2||linkMode)return;e.stopPropagation();setDragging(idx);setSelected(idx);const r=canvasRef.current.getBoundingClientRect();setOffset({x:(e.clientX-r.left)/zoom-pan.x-tables[idx].x,y:(e.clientY-r.top)/zoom-pan.y-tables[idx].y})};
  const onCvsDown=e=>{if(linkMode)return;if(spacePressed||e.target===canvasRef.current||e.target.tagName==="svg"){setSelected(null);setIsPanning(true);setPanStart({x:e.clientX-pan.x*zoom,y:e.clientY-pan.y*zoom})}};
  const onMM=useCallback(e=>{if(linkMode&&linkFrom){const r=canvasRef.current.getBoundingClientRect();setLinkMouse({x:(e.clientX-r.left)/zoom-pan.x,y:(e.clientY-r.top)/zoom-pan.y})}if(dragging!==null){const r=canvasRef.current.getBoundingClientRect();setTables(p=>p.map((t,i)=>i===dragging?{...t,x:(e.clientX-r.left)/zoom-pan.x-offset.x,y:(e.clientY-r.top)/zoom-pan.y-offset.y}:t))}else if(isPanning){setPan({x:(e.clientX-panStart.x)/zoom,y:(e.clientY-panStart.y)/zoom})}},[dragging,isPanning,offset,pan,panStart,zoom,linkMode,linkFrom]);
  const onMU=useCallback(()=>{setDragging(null);setIsPanning(false)},[]);
  useEffect(()=>{window.addEventListener("mousemove",onMM);window.addEventListener("mouseup",onMU);return()=>{window.removeEventListener("mousemove",onMM);window.removeEventListener("mouseup",onMU)}},[onMM,onMU]);
  useEffect(()=>{const esc=e=>{if(e.key==="Escape"){setLinkMode(false);setLinkFrom(null);setLinkMouse(null)}};const kd=e=>{if(e.code==="Space"&&!linkMode){e.preventDefault();setSpacePressed(true);canvasRef.current?.focus()}};const ku=e=>{if(e.code==="Space"){e.preventDefault();setSpacePressed(false);setIsPanning(false)}};window.addEventListener("keydown",esc);window.addEventListener("keydown",kd);window.addEventListener("keyup",ku);return()=>{window.removeEventListener("keydown",esc);window.removeEventListener("keydown",kd);window.removeEventListener("keyup",ku)}},[linkMode]);
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.max(.25,Math.min(2.5,z+(e.deltaY>0?-.06:.06))))};
  const fc=(tN,fN)=>{const t=tables.find(tb=>tb.name===tN);if(!t)return{x:0,y:0};const fi=t.fields.findIndex(f=>f.name===fN);return{x:t.x+TW/2,y:t.y+HDR+(fi>=0?fi:0)*ROW+ROW/2}};
  const fp=(ti,fi)=>{const t=tables[ti];if(!t)return{x:0,y:0};return{x:t.x+TW/2,y:t.y+HDR+fi*ROW+ROW/2}};
  const onFC=(ti,fi)=>{if(!linkMode)return;const t=tables[ti],f=t.fields[fi];if(!linkFrom){setLinkFrom({table:t.name,field:f.name,tableIdx:ti,fieldIdx:fi});flash(`From: ${t.name}.${f.name} → click target`,"info")}else{if(linkFrom.table===t.name&&linkFrom.field===f.name){setLinkFrom(null);setLinkMouse(null);return}if(relations.some(r=>(r.from===linkFrom.table&&r.fromField===linkFrom.field&&r.to===t.name&&r.toField===f.name)||(r.from===t.name&&r.fromField===f.name&&r.to===linkFrom.table&&r.toField===linkFrom.field))){flash("Relation already exists","danger");setLinkFrom(null);setLinkMouse(null);return}setRelations(p=>[...p,{id:uid(),from:linkFrom.table,fromField:linkFrom.field,to:t.name,toField:f.name}]);flash(`Linked: ${linkFrom.table}.${linkFrom.field} → ${t.name}.${f.name}`);setLinkFrom(null);setLinkMouse(null)}};
  const refreshRels=tbls=>{setRelations(detectRelations(tbls.map(({x,y,collapsed,...r})=>r)))};
  const handleAdd=nt=>{const mx=tables.length>0?Math.max(...tables.map(t=>t.x)):0;const u=[...tables,{...nt,x:mx+350,y:80,collapsed:false}];setTables(u);refreshRels(u);flash(`"${nt.name}" created`)};
  const handleSave=upd=>{const u=tables.map(t=>t.id===upd.id?{...t,...upd}:t);setTables(u);refreshRels(u);flash(`"${upd.name}" saved`)};
  const handleDel=id=>{const t=tables.find(tb=>tb.id===id);setTables(tables.filter(tb=>tb.id!==id));setRelations(p=>p.filter(r=>r.from!==t?.name&&r.to!==t?.name));setSelected(null);flash(`"${t?.name}" deleted`,"danger")};
  const fitToView=()=>{if(tables.length===0)return;const xs=tables.map(t=>t.x),ys=tables.map(t=>t.y);const minX=Math.min(...xs),minY=Math.min(...ys),maxX=Math.max(...xs),maxY=Math.max(...ys);const contentW=maxX-minX+TW+80,contentH=maxY-minY+Math.max(...tables.map(t=>HDR+t.fields.length*ROW))+80;const vw=window.innerWidth-24,vh=window.innerHeight-100;const newZoom=Math.min(vw/contentW,vh/contentH,1.5);const newX=-minX*newZoom+(vw-contentW*newZoom)/2,newY=-minY*newZoom+(vh-contentH*newZoom)/2;setZoom(newZoom);setPan({x:newX/newZoom,y:newY/newZoom})};
  const delRel=id=>{setRelations(p=>p.filter(r=>r.id!==id));flash("Relation removed","danger")};

  return(
    <div style={{height:"100vh",overflow:"hidden",position:"relative"}}>
      {/* Toolbar */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:54,background:"rgba(6,8,15,.95)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(0,212,255,.1)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 12px",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Btn variant="ghost" onClick={onBack}>← Back</Btn>
          <div style={{width:1,height:22,background:"rgba(255,255,255,.1)"}}/>
          <span style={{fontFamily:"'JetBrains Mono'",fontWeight:600,fontSize:14}}>Schema<span style={{color:"#00d4ff"}}>Forge</span></span>
          <span style={{fontSize:11,color:"#64748b"}}>— {tables.length} tbl · {relations.length} rel</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <Btn variant="green" onClick={()=>setShowAddTable(true)}>+ Table</Btn>
          <Btn variant={linkMode?"active":"purple"} onClick={()=>{setLinkMode(!linkMode);setLinkFrom(null);setLinkMouse(null)}}>{linkMode?"🔗 Linking...":"🔗 Link"}</Btn>
          <Btn variant="ghost" onClick={()=>setShowRelations(true)}>Rels ({relations.length})</Btn>
          <div style={{width:1,height:22,background:"rgba(255,255,255,.1)"}}/>
          <div style={{display:"flex",alignItems:"center",gap:2,background:"rgba(255,255,255,.04)",borderRadius:8,padding:"3px 6px",border:"1px solid rgba(255,255,255,.06)"}}>
            <button onClick={()=>setZoom(z=>Math.max(.25,z-.1))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:15,padding:"2px 6px"}}>−</button>
            <span style={{fontFamily:"'JetBrains Mono'",fontSize:11,color:"#94a3b8",minWidth:38,textAlign:"center"}}>{Math.round(zoom*100)}%</span>
            <button onClick={()=>setZoom(z=>Math.min(2.5,z+.1))} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:15,padding:"2px 6px"}}>+</button>
          </div>
          <Btn variant="ghost" onClick={fitToView}>Fit</Btn>
          <Btn variant={showMinimap?"cyan":"ghost"} onClick={()=>setShowMinimap(s=>!s)}>Map</Btn>
          <div style={{width:1,height:22,background:"rgba(255,255,255,.1)"}}/>
          <Btn variant="cyan" onClick={()=>setShowExportImage(true)}>🖼</Btn>
          <Btn variant="amber" onClick={()=>setShowExport(true)}>⬇ Export SQL</Btn>
        </div>
      </div>
      {/* Link Mode Banner */}
      {linkMode&&<div style={{position:"absolute",top:54,left:0,right:0,height:36,background:"rgba(167,139,250,.1)",borderBottom:"1px solid rgba(167,139,250,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:12,zIndex:40,fontSize:12,color:"#a78bfa"}}><span style={{fontWeight:600}}>🔗 LINK MODE</span><span>{linkFrom?`From: ${linkFrom.table}.${linkFrom.field} → Click target`:"Click source field"}</span>{linkFrom&&<Btn variant="danger" onClick={()=>{setLinkFrom(null);setLinkMouse(null);flash("Link cancelled","info")}} style={{padding:"2px 10px",fontSize:10}}>✕ Cancel</Btn>}<Btn variant="ghost" onClick={()=>{setLinkMode(false);setLinkFrom(null);setLinkMouse(null)}} style={{padding:"2px 10px",fontSize:10}}>ESC</Btn></div>}
      {/* Canvas */}
      <div ref={canvasRef} onMouseDown={onCvsDown} onWheel={onWheel} style={{position:"absolute",top:linkMode?90:54,left:0,right:0,bottom:0,cursor:linkMode?"crosshair":spacePressed||isPanning?"grabbing":dragging!==null?"grabbing":"grab",overflow:"hidden",backgroundImage:"radial-gradient(circle at 1px 1px,rgba(255,255,255,.03) 1px,transparent 0)",backgroundSize:`${24*zoom}px ${24*zoom}px`,backgroundPosition:`${pan.x*zoom}px ${pan.y*zoom}px`}}>
        <div style={{transform:`scale(${zoom}) translate(${pan.x}px,${pan.y}px)`,transformOrigin:"0 0",position:"absolute",top:0,left:0,width:5000,height:4000}}>
          <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}>
            <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f59e0b" opacity=".8"/></marker><marker id="art" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a78bfa" opacity=".9"/></marker></defs>
            {relations.map((rel,i)=>{const from=fc(rel.from,rel.fromField),to=fc(rel.to,rel.toField);const cp=Math.abs(from.x-to.x)*.35+50;const sX=from.x+(to.x>from.x?TW/2+4:-TW/2-4),eX=to.x+(from.x>to.x?TW/2+4:-TW/2-4);const d=`M ${sX} ${from.y} C ${sX+(to.x>from.x?cp:-cp)} ${from.y},${eX+(from.x>to.x?cp:-cp)} ${to.y},${eX} ${to.y}`;return<g key={i} style={{cursor:"pointer",pointerEvents:"stroke"}} onClick={e=>{if(e.altKey){delRel(rel.id)}}} title={`${rel.from}.${rel.fromField} → ${rel.to}.${rel.toField} (Alt+Click to delete)`}><path d={d} fill="none" stroke="rgba(245,158,11,.1)" strokeWidth="12"/><path d={d} fill="none" stroke="#f59e0b" strokeWidth="1.5" opacity={hoveredField?.relId===i?.9:.55} markerEnd="url(#arr)" strokeDasharray="6 3" onMouseEnter={()=>!linkMode&&setHoveredField({relId:i})} onMouseLeave={()=>!linkMode&&setHoveredField(null)}/></g>})}
            {linkFrom&&linkMouse&&(()=>{const from=fp(linkFrom.tableIdx,linkFrom.fieldIdx);const sX=from.x+(linkMouse.x>from.x?TW/2+4:-TW/2-4);return<line x1={sX} y1={from.y} x2={linkMouse.x} y2={linkMouse.y} stroke="#a78bfa" strokeWidth="2" strokeDasharray="8 4" opacity=".8" markerEnd="url(#art)"/>})()}
          </svg>
          {tables.map((table,idx)=>{const sel=selected===idx;return(
            <div key={table.id} onMouseDown={e=>onTblDown(e,idx)} onDoubleClick={e=>{e.stopPropagation();if(!linkMode)setEditingTable(table)}} style={{position:"absolute",left:table.x,top:table.y,width:TW,background:sel?"rgba(15,23,42,.98)":"rgba(10,16,30,.95)",border:`1px solid ${sel?"rgba(0,212,255,.5)":"rgba(255,255,255,.08)"}`,borderRadius:12,zIndex:sel?10:2,boxShadow:sel?"0 0 0 2px rgba(0,212,255,.2),0 8px 32px rgba(0,0,0,.5)":"0 4px 24px rgba(0,0,0,.3)",transition:dragging===idx?"none":"box-shadow .2s",userSelect:"none",overflow:"hidden"}}>
              <div style={{padding:"9px 12px",background:sel?"rgba(0,212,255,.08)":"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:8,height:8,borderRadius:2,background:sel?"#00d4ff":"#334155"}}/><span style={{fontFamily:"'JetBrains Mono'",fontSize:12,fontWeight:600}}>{table.name}</span></div>
                <div style={{display:"flex",gap:4}}><button onClick={e=>{e.stopPropagation();if(!linkMode)setEditingTable(table)}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,padding:"0 3px"}}>✎</button><button onClick={e=>{e.stopPropagation();setTables(p=>p.map((t,i)=>i===idx?{...t,collapsed:!t.collapsed}:t))}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,padding:"0 3px"}}>{table.collapsed?"▸":"▾"}</button></div>
              </div>
              {!table.collapsed&&table.fields.map((f,fi)=>{const isH=hoveredField?.tableIdx===idx&&hoveredField?.fieldIdx===fi;const isS=linkFrom?.tableIdx===idx&&linkFrom?.fieldIdx===fi;const tl=f.size?`${f.type}(${f.size})`:f.type;return(
                <div key={f.id||fi} onClick={e=>{e.stopPropagation();onFC(idx,fi)}} onMouseEnter={()=>linkMode&&setHoveredField({tableIdx:idx,fieldIdx:fi})} onMouseLeave={()=>setHoveredField(null)}
                  style={{padding:"6px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:fi<table.fields.length-1?"1px solid rgba(255,255,255,.03)":"none",fontSize:11,background:isS?"rgba(167,139,250,.12)":isH&&linkMode?"rgba(0,212,255,.06)":"transparent",cursor:linkMode?"crosshair":"default",borderLeft:isS?"3px solid #a78bfa":isH&&linkMode?"3px solid rgba(0,212,255,.4)":"3px solid transparent",transition:"background .1s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    {(f.isPrimary||f.name==="id")?<span style={{color:"#f59e0b",fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono'",width:18}}>PK</span>:f.isForeign?<span style={{color:"#a78bfa",fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono'",width:18}}>FK</span>:<span style={{width:18}}/>}
                    <span style={{fontFamily:"'JetBrains Mono'",fontSize:11,color:f.isPrimary||f.name==="id"?"#f59e0b":f.isForeign?"#a78bfa":"#cbd5e1"}}>{f.name}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    {f.nullable&&<span style={{fontSize:7,color:"#475569"}}>null</span>}
                    <span style={{fontFamily:"'JetBrains Mono'",fontSize:9,color:TC[f.type]||"#64748b",background:`${TC[f.type]||"#64748b"}12`,padding:"1px 6px",borderRadius:4}}>{tl}</span>
                    {linkMode&&<span style={{width:8,height:8,borderRadius:"50%",background:isS?"#a78bfa":isH?"#00d4ff":"rgba(255,255,255,.15)",border:`1.5px solid ${isS?"#a78bfa":isH?"#00d4ff":"rgba(255,255,255,.15)"}`,transition:"all .15s",flexShrink:0}}/>}
                  </div>
                </div>
              )})}
              {table.collapsed&&<div style={{padding:"7px 12px",fontSize:10,color:"#475569",fontStyle:"italic"}}>{table.fields.length} fields</div>}
            </div>
          )})}
        </div>
      </div>
      {/* Minimap */}
      {showMinimap&&tables.length>0&&<div style={{position:"absolute",bottom:16,right:16,width:190,height:130,background:"rgba(10,16,30,.9)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,overflow:"hidden",zIndex:30}}><svg width="190" height="130" viewBox="0 0 2400 1600">{tables.map((t,i)=><rect key={i} x={t.x} y={t.y} width={260} height={t.collapsed?55:HDR+t.fields.length*ROW} fill={selected===i?"rgba(0,212,255,.4)":"rgba(255,255,255,.12)"} stroke={selected===i?"#00d4ff":"rgba(255,255,255,.08)"} rx="4"/>)}{relations.map((r,i)=>{const f=fc(r.from,r.fromField),t=fc(r.to,r.toField);return<line key={i} x1={f.x} y1={f.y} x2={t.x} y2={t.y} stroke="#f59e0b" strokeWidth="3" opacity=".35"/>})}</svg></div>}
      {/* Hints */}
      <div style={{position:"absolute",bottom:16,left:16,display:"flex",gap:10,fontSize:11,color:"#475569",zIndex:30}}><span>🖱 Drag</span><span>⚙ Dbl-click edit</span><span>🔍 Scroll zoom</span><span>🔗 Link mode</span><span>Alt+Click line to delete</span><span>Space+Drag to pan</span></div>
      {/* Toast */}
      {toast&&<div style={{position:"absolute",top:linkMode?104:68,left:"50%",transform:"translateX(-50%)",background:toast.type==="danger"?"rgba(239,68,68,.15)":toast.type==="info"?"rgba(167,139,250,.15)":"rgba(52,211,153,.15)",border:`1px solid ${toast.type==="danger"?"rgba(239,68,68,.3)":toast.type==="info"?"rgba(167,139,250,.3)":"rgba(52,211,153,.3)"}`,color:toast.type==="danger"?"#ef4444":toast.type==="info"?"#a78bfa":"#34d399",padding:"8px 20px",borderRadius:10,fontSize:13,fontWeight:500,zIndex:100,animation:"slideDown .3s ease"}}>{toast.msg}</div>}
      {showAddTable&&<AddTableModal onClose={()=>setShowAddTable(false)} onAdd={handleAdd} existingNames={tables.map(t=>t.name)}/>}
      {editingTable&&<EditTableModal table={editingTable} onClose={()=>setEditingTable(null)} onSave={handleSave} onDelete={handleDel}/>}
      {showRelations&&<RelationsModal relations={relations} onClose={()=>setShowRelations(false)} onDelete={delRel}/>}
      {showExport&&<ExportModal tables={tables.map(({x,y,collapsed,...r})=>r)} relations={relations} onClose={()=>setShowExport(false)}/>}
      {showExportImage&&<ExportImageModal tables={tables} relations={relations} onClose={()=>setShowExportImage(false)}/>}
    </div>
  );
}

// ============================================
// APP ROUTER
// ============================================
function App(){
  const[page,setPage]=useState("import");const[schema,setSchema]=useState(null);
  if(page==="canvas"&&schema)return<CanvasPage schema={schema} onBack={()=>setPage("import")}/>;
  return<ImportPage onParse={d=>{setSchema(d);setPage("canvas")}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
